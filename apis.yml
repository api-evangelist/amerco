    name: U-Haul
    description: >-
      U-Haul provides do-it-yourself moving and storage services including truck
      and trailer rentals, self-storage, moving supplies, and U-Box portable
      storage containers. Partners access dealer management tools via the U-Haul
      dealer portal and self-storage affiliates use WebSelfStorage management
      software.
