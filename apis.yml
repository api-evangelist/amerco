aid: amerco
name: AMERCO
description: >-
  AMERCO, operating as U-Haul Holding Company, is America's largest do-it-yourself
  moving and storage company. The company provides truck and trailer rentals,
  self-storage facilities, moving supplies, and portable moving and storage
  containers through its U-Haul brand. AMERCO operates the Moving Help marketplace
  connecting consumers to moving service providers, the U-Haul Self-Storage
  Affiliate Network, and WebSelfStorage management software for independent
  storage facilities. It also operates AMERITAS Life Insurance and Oxford Life
  Insurance subsidiaries.
